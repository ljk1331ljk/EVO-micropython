<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EVO MicroPython Firmware</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        color: #16202a;
        background: #f7f9fb;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
        line-height: 1.15;
      }
      h2 {
        margin: 32px 0 12px;
        font-size: 1.1rem;
      }
      p {
        margin: 0 0 20px;
        color: #4d5b68;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        border: 1px solid #d9e1e8;
        border-radius: 8px;
        overflow: hidden;
      }
      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #e7edf2;
        text-align: left;
        font-size: 0.95rem;
      }
      th {
        color: #364657;
        background: #eef3f7;
        font-weight: 650;
      }
      tr:last-child td {
        border-bottom: 0;
      }
      a {
        color: #0a6d91;
        font-weight: 650;
      }
      .empty {
        padding: 16px;
        background: #ffffff;
        border: 1px solid #d9e1e8;
        border-radius: 8px;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #ecf2f8;
          background: #10161d;
        }
        p {
          color: #aab7c4;
        }
        table,
        .empty {
          background: #151d26;
          border-color: #2c3845;
        }
        th,
        td {
          border-bottom-color: #283542;
        }
        th {
          color: #dbe6f1;
          background: #1d2834;
        }
        a {
          color: #66c6e8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>EVO MicroPython Firmware</h1>
      <p>Stable firmware versions and beta builds.</p>
      <section>
        <h2>Beta Versions</h2>
        <div id="beta" class="empty">No beta firmware published yet.</div>
      </section>
      <section>
        <h2>Stable Versions</h2>
        <div id="stable" class="empty">Loading firmware versions...</div>
      </section>
    </main>
    <script>
      const link = (href, label) => '<a href="' + href + '">' + label + '</a>';
      const renderRow = item => '<tr><td>' + item.version + '</td><td>' + new Date(item.generated_at).toLocaleString() + '</td><td>' + item.devices.map(device => device.board).join(', ') + '</td><td>' + link(item.manifest_url, 'Manifest') + '</td></tr>';

      fetch('firmware/index.json')
        .then(response => response.json())
        .then(index => {
          const stable = document.getElementById('stable');
          const beta = document.getElementById('beta');

          const betaItems = index.beta || (index.latest_beta ? [index.latest_beta] : []);
          if (betaItems.length > 0) {
            beta.className = '';
            beta.innerHTML = '<table><thead><tr><th>Version</th><th>Generated</th><th>Boards</th><th>Manifest</th></tr></thead><tbody>' + betaItems.map(renderRow).join('') + '</tbody></table>';
          }

          if (index.stable.length > 0) {
            stable.className = '';
            stable.innerHTML = '<table><thead><tr><th>Version</th><th>Generated</th><th>Boards</th><th>Manifest</th></tr></thead><tbody>' + index.stable.map(renderRow).join('') + '</tbody></table>';
          } else {
            stable.textContent = 'No stable firmware published yet.';
          }
        })
        .catch(() => {
          document.getElementById('stable').textContent = 'Firmware index is not available yet.';
        });
    </script>
  </body>
</html>
