name: Firmware release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      matrix_json:
        description: 'Optional JSON array of firmware targets. Leave blank to use .github/firmware-release-matrix.json.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Newest supported ESP-IDF version, should match ports/esp32/README.md.
  IDF_NEWEST_VER: "v5.5.1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Read firmware target matrix
        id: matrix
        shell: bash
        env:
          INPUT_MATRIX_JSON: ${{ github.event.inputs.matrix_json || '' }}
        run: |
          set -euo pipefail

          raw="${INPUT_MATRIX_JSON}"
          if [ -z "${raw}" ] || [ "${raw}" = "null" ]; then
            raw="$(jq -c . .github/firmware-release-matrix.json)"
          fi

          jq -e '
            type == "array"
            and length > 0
            and all(.[]; has("port") and has("board") and has("artifacts"))
          ' <<< "${raw}" >/dev/null

          echo "matrix=$(jq -c '{include: .}' <<< "${raw}")" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      MAKEOPTS: -j2
      PORT: ${{ matrix.port }}
      BOARD: ${{ matrix.board }}
      VARIANT: ${{ matrix.variant || '' }}
      RELEASE_USER_C_MODULES: ${{ matrix.user_c_modules || '' }}
      RELEASE_FROZEN_MANIFEST: ${{ matrix.frozen_manifest || '' }}
      ARTIFACTS: ${{ matrix.artifacts }}
      DEVICE_ID: ${{ matrix.device_id || matrix.board }}
      PRODUCT: ${{ matrix.product || matrix.board }}
      CHIP: ${{ matrix.chip || 'esp32' }}
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        if: ${{ matrix.port == 'esp32' }}
        uses: ./.github/actions/setup_esp32
        with:
          idf_ver: ${{ env.IDF_NEWEST_VER }}
          ccache_key: firmware-release-${{ matrix.board }}-${{ matrix.variant || 'default' }}

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail

          if [ "${PORT}" != "esp32" ]; then
            echo "Unsupported firmware release port: ${PORT}"
            echo "Currently supported: esp32"
            exit 1
          fi

          repo_root="${GITHUB_WORKSPACE:-$(pwd)}"
          resolve_repo_path() {
            case "$1" in
              /*) printf '%s\n' "$1" ;;
              *) printf '%s/%s\n' "${repo_root}" "$1" ;;
            esac
          }

          make ${MAKEOPTS} -C mpy-cross
          export MICROPY_MPYCROSS="${repo_root}/mpy-cross/build/mpy-cross"

          build_dir="${RUNNER_TEMP}/micropython-${PORT}-${BOARD}"
          make_args=(BOARD="${BOARD}" BUILD="${build_dir}")
          if [ -n "${VARIANT}" ]; then
            make_args+=(BOARD_VARIANT="${VARIANT}")
          fi
          if [ -n "${RELEASE_USER_C_MODULES}" ]; then
            make_args+=(USER_C_MODULES="$(resolve_repo_path "${RELEASE_USER_C_MODULES}")")
          fi
          if [ -n "${RELEASE_FROZEN_MANIFEST}" ]; then
            make_args+=(FROZEN_MANIFEST="$(resolve_repo_path "${RELEASE_FROZEN_MANIFEST}")")
          fi

          if [ ! -f "./esp-idf/export.sh" ]; then
            echo "ESP-IDF export script not found at ./esp-idf/export.sh"
            exit 1
          fi
          source ./esp-idf/export.sh

          make ${MAKEOPTS} -C "ports/${PORT}" "${make_args[@]}" submodules
          make ${MAKEOPTS} -C "ports/${PORT}" "${make_args[@]}"

          fw_date="$(date -u '+%Y%m%d')"
          fw_version="$(git describe --tags --dirty --always --match 'v[1-9].*' --abbrev=10)"
          base_name="${BOARD}"
          if [ -n "${VARIANT}" ]; then
            base_name="${base_name}-${VARIANT}"
          fi

          mkdir -p dist
          manifest_assets="${RUNNER_TEMP}/${base_name}-assets.jsonl"
          for ext in ${ARTIFACTS}; do
            case "${ext}" in
              bootloader-bin)
                src="${build_dir}/bootloader/bootloader.bin"
                dest_ext="bootloader.bin"
                asset_type="bootloader"
                flash_offset="0x0"
                ;;
              partition-table-bin)
                src="${build_dir}/partition_table/partition-table.bin"
                dest_ext="partition-table.bin"
                asset_type="partition_table"
                flash_offset="0x8000"
                ;;
              app-bin)
                src="${build_dir}/micropython.bin"
                dest_ext="micropython.bin"
                asset_type="application"
                flash_offset="0x10000"
                ;;
              elf|map)
                src="${build_dir}/micropython.${ext}"
                dest_ext="${ext}"
                asset_type="${ext}"
                flash_offset=""
                ;;
              *)
                src="${build_dir}/firmware.${ext}"
                dest_ext="${ext}"
                asset_type="${ext}"
                if [ "${ext}" = "bin" ]; then
                  flash_offset="0x0"
                else
                  flash_offset=""
                fi
                ;;
            esac
            if [ ! -f "${src}" ]; then
              echo "Expected artifact not found: ${src}"
              exit 1
            fi
            dest="dist/${base_name}-${fw_date}-${fw_version}.${dest_ext}"
            cp "${src}" "${dest}"
            jq -n \
              --arg type "${asset_type}" \
              --arg file "$(basename "${dest}")" \
              --arg offset "${flash_offset}" \
              --arg sha256 "$(sha256sum "${dest}" | cut -d' ' -f1)" \
              --argjson size "$(stat -c '%s' "${dest}")" \
              '{type: $type, file: $file, offset: $offset, sha256: $sha256, size: $size}' \
              >> "${manifest_assets}"
          done

          jq -n \
            --arg id "${DEVICE_ID}" \
            --arg board "${BOARD}" \
            --arg variant "${VARIANT}" \
            --arg product "${PRODUCT}" \
            --arg port "${PORT}" \
            --arg chip "${CHIP}" \
            --slurpfile assets "${manifest_assets}" \
            '{
              id: $id,
              board: $board,
              variant: $variant,
              product: $product,
              port: $port,
              chip: $chip,
              assets: ($assets | map({(.type): del(.type)}) | add),
              flash_sequence: [
                {
                  path: "bootloader.bin",
                  address: "0x0",
                  description: "Bootloader"
                },
                {
                  path: "partition-table.bin",
                  address: "0x8000",
                  description: "Partition table"
                },
                {
                  path: "micropython.bin",
                  address: "0x10000",
                  description: "MicroPython"
                }
              ]
            }' > "dist/${base_name}-device-manifest.json"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.port }}-${{ matrix.board }}${{ matrix.variant && format('-{0}', matrix.variant) || '' }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      pages_url: ${{ steps.pages.outputs.pages_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release and prepare Pages assets
        id: pages
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            title="Firmware ${tag}"
          else
            tag="firmware-$(date -u '+%Y%m%d')-${GITHUB_SHA::7}"
            title="Firmware ${GITHUB_SHA::7}"
          fi

          channel="stable"
          prerelease="false"
          mutable_dir="latest"
          if [[ "${tag}" == *"-beta"* || "${tag}" == *".beta"* || "${tag}" == *"beta"* ]]; then
            channel="beta"
            prerelease="true"
            mutable_dir="beta"
          fi

          jq -s \
            --arg schema_version "1" \
            --arg name "EVO MicroPython Firmware" \
            --arg version "${tag}" \
            --arg channel "${channel}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg commit "${GITHUB_SHA}" \
            --arg release_tag "${tag}" \
            --argjson prerelease "${prerelease}" \
            --arg generated_at "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            '{
              schema_version: ($schema_version | tonumber),
              name: $name,
              version: $version,
              channel: $channel,
              repository: $repository,
              commit: $commit,
              release_tag: $release_tag,
              prerelease: $prerelease,
              generated_at: $generated_at,
              devices: .
            }' release-assets/*-device-manifest.json > release-assets/firmware-manifest.json

          cp release-assets/firmware-manifest.json release-assets/latest.json
          rm release-assets/*-device-manifest.json

          notes_file="${RUNNER_TEMP}/release-notes.md"
          {
            echo "${channel^} EVO MicroPython firmware ${tag} for ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
            echo
            echo "PWA manifest assets:"
            echo "- firmware-manifest.json"
            echo "- latest.json"
            echo
            echo "Firmware assets:"
            for file in release-assets/*; do
              echo "- $(basename "${file}")"
            done
          } > "${notes_file}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-assets/* --clobber
            if [ "${channel}" = "beta" ]; then
              gh release edit "${tag}" --prerelease --title "${title}" --notes-file "${notes_file}"
            else
              gh release edit "${tag}" --title "${title}" --notes-file "${notes_file}"
            fi
          else
            release_args=()
            if [ "${channel}" = "beta" ]; then
              release_args+=(--prerelease)
            fi
            gh release create "${tag}" release-assets/* \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes-file "${notes_file}" \
              "${release_args[@]}"
          fi

          if [ "${channel}" = "stable" ]; then
            latest_notes_file="${RUNNER_TEMP}/latest-release-notes.md"
            {
              echo "Latest stable EVO MicroPython firmware."
              echo
              echo "Current version: ${tag}"
              echo
              echo "The PWA can fetch the stable manifest from:"
              echo
              echo "https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/firmware/latest/latest.json"
            } > "${latest_notes_file}"

            if gh release view latest >/dev/null 2>&1; then
              gh release delete latest --cleanup-tag --yes
            fi

            git tag -f latest "${GITHUB_SHA}"
            git push origin refs/tags/latest --force

            gh release create latest release-assets/* \
              --target "${GITHUB_SHA}" \
              --title "Latest Firmware" \
              --notes-file "${latest_notes_file}"
          fi

          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          pages_root="https://${owner}.github.io/${repo}"
          version_base_url="${pages_root}/firmware/${tag}"
          mutable_base_url="${pages_root}/firmware/${mutable_dir}"

          mkdir -p "pages-site/firmware/${tag}" "pages-site/firmware/${mutable_dir}"
          cp release-assets/* "pages-site/firmware/${tag}/"
          cp release-assets/* "pages-site/firmware/${mutable_dir}/"

          for board in EVOX1E EVOX1P; do
            board_lower="$(printf '%s' "${board}" | tr '[:upper:]' '[:lower:]')"
            for base in "pages-site/firmware/${tag}" "pages-site/firmware/${mutable_dir}"; do
              mkdir -p "${base}/${board}" "${base}/${board_lower}"
              cp "${base}/${board}-"*".bootloader.bin" "${base}/${board}/bootloader.bin"
              cp "${base}/${board}-"*".partition-table.bin" "${base}/${board}/partition-table.bin"
              cp "${base}/${board}-"*".micropython.bin" "${base}/${board}/micropython.bin"
              cp "${base}/${board}/bootloader.bin" "${base}/${board_lower}/bootloader.bin"
              cp "${base}/${board}/partition-table.bin" "${base}/${board_lower}/partition-table.bin"
              cp "${base}/${board}/micropython.bin" "${base}/${board_lower}/micropython.bin"
            done
          done

          jq --arg base_url "${version_base_url}" '
            .base_url = $base_url
            | .devices |= map(
                .assets.bootloader.url = ($base_url + "/" + (.board | ascii_downcase) + "/bootloader.bin")
                | .assets.partition_table.url = ($base_url + "/" + (.board | ascii_downcase) + "/partition-table.bin")
                | .assets.application.url = ($base_url + "/" + (.board | ascii_downcase) + "/micropython.bin")
              )
          ' release-assets/firmware-manifest.json > "pages-site/firmware/${tag}/firmware-manifest.json"
          cp "pages-site/firmware/${tag}/firmware-manifest.json" "pages-site/firmware/${tag}/latest.json"

          jq --arg base_url "${mutable_base_url}" '
            .base_url = $base_url
            | .devices |= map(
                .assets.bootloader.url = ($base_url + "/" + (.board | ascii_downcase) + "/bootloader.bin")
                | .assets.partition_table.url = ($base_url + "/" + (.board | ascii_downcase) + "/partition-table.bin")
                | .assets.application.url = ($base_url + "/" + (.board | ascii_downcase) + "/micropython.bin")
              )
          ' release-assets/firmware-manifest.json > "pages-site/firmware/${mutable_dir}/firmware-manifest.json"
          cp "pages-site/firmware/${mutable_dir}/firmware-manifest.json" "pages-site/firmware/${mutable_dir}/latest.json"

          cat > pages-site/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>EVO MicroPython Firmware</title>
              <style>
                :root {
                  color-scheme: light dark;
                  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }
                body {
                  margin: 0;
                  color: #16202a;
                  background: #f7f9fb;
                }
                main {
                  max-width: 960px;
                  margin: 0 auto;
                  padding: 48px 20px;
                }
                h1 {
                  margin: 0 0 8px;
                  font-size: 2rem;
                  line-height: 1.15;
                }
                h2 {
                  margin: 32px 0 12px;
                  font-size: 1.1rem;
                }
                p {
                  margin: 0 0 20px;
                  color: #4d5b68;
                }
                table {
                  width: 100%;
                  border-collapse: collapse;
                  background: #ffffff;
                  border: 1px solid #d9e1e8;
                  border-radius: 8px;
                  overflow: hidden;
                }
                th,
                td {
                  padding: 12px 14px;
                  border-bottom: 1px solid #e7edf2;
                  text-align: left;
                  font-size: 0.95rem;
                }
                th {
                  color: #364657;
                  background: #eef3f7;
                  font-weight: 650;
                }
                tr:last-child td {
                  border-bottom: 0;
                }
                a {
                  color: #0a6d91;
                  font-weight: 650;
                }
                .empty {
                  padding: 16px;
                  background: #ffffff;
                  border: 1px solid #d9e1e8;
                  border-radius: 8px;
                }
                @media (prefers-color-scheme: dark) {
                  body {
                    color: #ecf2f8;
                    background: #10161d;
                  }
                  p {
                    color: #aab7c4;
                  }
                  table,
                  .empty {
                    background: #151d26;
                    border-color: #2c3845;
                  }
                  th,
                  td {
                    border-bottom-color: #283542;
                  }
                  th {
                    color: #dbe6f1;
                    background: #1d2834;
                  }
                  a {
                    color: #66c6e8;
                  }
                }
              </style>
            </head>
            <body>
              <main>
                <h1>EVO MicroPython Firmware</h1>
                <p>Stable firmware versions and the latest beta build.</p>
                <section>
                  <h2>Latest Beta</h2>
                  <div id="beta" class="empty">No beta firmware published yet.</div>
                </section>
                <section>
                  <h2>Stable Versions</h2>
                  <div id="stable" class="empty">Loading firmware versions...</div>
                </section>
              </main>
              <script>
                const link = (href, label) => '<a href="' + href + '">' + label + '</a>';
                const renderRow = item => '<tr><td>' + item.version + '</td><td>' + new Date(item.generated_at).toLocaleString() + '</td><td>' + item.devices.map(device => device.board).join(', ') + '</td><td>' + link(item.manifest_url, 'Manifest') + '</td></tr>';

                fetch('firmware/index.json')
                  .then(response => response.json())
                  .then(index => {
                    const stable = document.getElementById('stable');
                    const beta = document.getElementById('beta');

                    if (index.latest_beta) {
                      beta.className = '';
                      beta.innerHTML = '<table><thead><tr><th>Version</th><th>Generated</th><th>Boards</th><th>Manifest</th></tr></thead><tbody>' + renderRow(index.latest_beta) + '</tbody></table>';
                    }

                    if (index.stable.length > 0) {
                      stable.className = '';
                      stable.innerHTML = '<table><thead><tr><th>Version</th><th>Generated</th><th>Boards</th><th>Manifest</th></tr></thead><tbody>' + index.stable.map(renderRow).join('') + '</tbody></table>';
                    } else {
                      stable.textContent = 'No stable firmware published yet.';
                    }
                  })
                  .catch(() => {
                    document.getElementById('stable').textContent = 'Firmware index is not available yet.';
                  });
              </script>
            </body>
          </html>
          EOF
          touch pages-site/.nojekyll

          echo "pages_url=${pages_root}/firmware/${mutable_dir}/latest.json" >> "${GITHUB_OUTPUT}"

      - name: Publish firmware site branch
        shell: bash
        run: |
          set -euo pipefail

          deploy_dir="${RUNNER_TEMP}/pages-deploy"
          mkdir -p "${deploy_dir}"
          git init "${deploy_dir}"
          cd "${deploy_dir}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth=1 origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

          channel="stable"
          mutable_dir="latest"
          if [[ "${GITHUB_REF_NAME}" == *"-beta"* || "${GITHUB_REF_NAME}" == *".beta"* || "${GITHUB_REF_NAME}" == *"beta"* ]]; then
            channel="beta"
            mutable_dir="beta"
          fi

          rm -rf "firmware/${mutable_dir}"
          cp -a "${GITHUB_WORKSPACE}/pages-site/." .

          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          pages_root="https://${owner}.github.io/${repo}"
          stable_entries="${RUNNER_TEMP}/stable-firmware-index.jsonl"
          beta_entry="${RUNNER_TEMP}/beta-firmware-index.jsonl"
          : > "${stable_entries}"
          printf 'null\n' > "${beta_entry}"

          if [ -d firmware ]; then
            while IFS= read -r manifest; do
              dir="$(basename "$(dirname "${manifest}")")"
              if [ "${dir}" = "latest" ] || [ "${dir}" = "beta" ]; then
                continue
              fi
              jq -c \
                --arg manifest_url "${pages_root}/firmware/${dir}/firmware-manifest.json" \
                'select((.channel // "stable") == "stable")
                 | {
                    version,
                    release_tag,
                    generated_at,
                    manifest_url: $manifest_url,
                    devices: [.devices[] | {id, board, product, variant}]
                  }' "${manifest}" >> "${stable_entries}" || true
            done < <(find firmware -mindepth 2 -maxdepth 2 -name firmware-manifest.json | sort)
          fi

          if [ -f firmware/beta/firmware-manifest.json ]; then
            beta_tmp="${RUNNER_TEMP}/beta-firmware-index.tmp"
            jq -c \
              --arg manifest_url "${pages_root}/firmware/beta/latest.json" \
              'select((.channel // "stable") == "beta")
               | {
                  version,
                  release_tag,
                  generated_at,
                  manifest_url: $manifest_url,
                  devices: [.devices[] | {id, board, product, variant}]
                }' firmware/beta/firmware-manifest.json > "${beta_tmp}" || true
            if [ -s "${beta_tmp}" ]; then
              cp "${beta_tmp}" "${beta_entry}"
            fi
          fi

          jq -s \
            --slurpfile beta "${beta_entry}" \
            '{
              schema_version: 1,
              stable: (sort_by(.generated_at) | reverse),
              latest_stable: ((sort_by(.generated_at) | reverse)[0] // null),
              latest_beta: ($beta[0] // null)
            }' "${stable_entries}" > firmware/index.json

          git add -A
          if git diff --cached --quiet; then
            echo "No GitHub Pages changes to publish."
          else
            git commit -m "Deploy firmware pages for ${GITHUB_REF_NAME}"
            git push origin HEAD:gh-pages
          fi
